async function dbGetListings() {
  try {
    const r = await sbFetch("/rest/v1/listings?select=*&order=created_at.desc");
    if (!r.ok) return null;
    const rows = await r.json();
    return rows.map(row => ({
      id: String(row.id),
      displayName: row.display_name||"",
      address: row.address||"",
      lat: row.lat, lng: row.lng,
      photo: row.photo, video: row.video,
      ratings: row.ratings||[],
      comments: row.comments||[],
      submitter: row.submitter||"Anonymous",
      createdAt: new Date(row.created_at).getTime(),
      tags: row.tags||[],
      hours: row.hours||"",
      active: row.active!==false,
      visits: row.visits||0,
      description: row.description||"",
      holidays: row.holidays||["christmas"],
      pin: row.pin||"",
    }));
  } catch(e) { return null; }
}

async function dbSaveListing(listing) {

        address: listing.address,

function getDistanceMiles(la1,lo1,la2,lo2){const R=3958.8,dL=(la2-la1)*Math.PI/180,dG=(lo2-lo1)*Math.PI/180,a=Math.sin(dL/2)**2+Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(dG/2)**2;return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));}
function avgRating(l){return l.ratings.length?l.ratings.reduce((a,b)=>a+b,0)/l.ratings.length:0;}

function loadGoogleMaps() {
  return new Promise((resolve, reject) => {
    if (window.google && window.google.maps && window.google.maps.places) { resolve(window.google.maps); return; }
    // If Google already flagged an auth error, reject immediately
    if (window.gm_authFailure) { reject("auth"); return; }
    const ex = document.getElementById("gmap-script");
    if (ex) { const t=setInterval(()=>{if(window.gm_authFailure){clearInterval(t);reject("auth");}if(window.google&&window.google.maps&&window.google.maps.places){clearInterval(t);resolve(window.google.maps);}},100);setTimeout(()=>{clearInterval(t);reject("timeout")},5000);return; }
    // Set up auth failure callback BEFORE loading script
    window.gm_authFailure = function() { reject("auth"); };
    const s = document.createElement("script");
    s.id="gmap-script"; s.async=true; s.defer=true;
    s.src="https://maps.googleapis.com/maps/api/js?key="+GOOGLE_MAPS_API_KEY+"&libraries=places&callback=Function.prototype";
    s.onload=()=>{
      // Wait a tick for places to initialize
      setTimeout(()=>{
        if(window.gm_authFailure&&window.gm_authFailure._failed){reject("auth");return;}
        if(window.google&&window.google.maps&&window.google.maps.places){resolve(window.google.maps);}
        else reject("no-places");
      },500);
    };
    s.onerror=()=>reject("load-error");
    document.head.appendChild(s);
    setTimeout(()=>reject("timeout"),6000);
  });
}

function withTimeout(promise, ms) {
  return Promise.race([promise, new Promise(res => setTimeout(() => res(null), ms))]);
}

async function geocodeAddress(address) {
  if (window.google && window.google.maps) {
    return withTimeout(new Promise(res => {
      try {
        new window.google.maps.Geocoder().geocode({address}, (r,s) => {
          if (s==="OK"&&r[0]){const l=r[0].geometry.location;res({lat:l.lat(),lng:l.lng()});}else res(null);
        });
      } catch(e) { res(null); }
    }), 5000);
  }
  try {
    const r = await withTimeout(fetch("https://nominatim.openstreetmap.org/search?format=json&q="+encodeURIComponent(address)+"&limit=1"), 5000);
    if (!r) return null;
    const d = await r.json();
    if (d.length) return {lat:parseFloat(d[0].lat),lng:parseFloat(d[0].lon)};
  } catch(e){}
  return null;
}

function SearchPanel({onSearch, onClear, activeSearch, activeTags, onTagToggle, C, holiday}) {
  const H = HOLIDAYS[holiday];
  const allTags = TAGS[holiday];
  const [open, setOpen] = useState(false);
  const [zip, setZip] = useState("");
  const [radius, setRadius] = useState("10");
  const [detecting, setDetecting] = useState(false);
  const [err, setErr] = useState("");

  async function doZipSearch() {
    if (!zip.trim()) return; setErr("");
    const coords = await geocodeAddress(zip.trim()+", USA");
    if (!coords) { setErr("ZIP code not found — please try again."); return; }
    onSearch({lat:coords.lat, lng:coords.lng, miles:parseInt(radius), label:`Within ${radius} miles of ${zip}`});
    setOpen(false);
  }

  function doAutoDetect() {
    if (!navigator.geolocation) { setErr("Enter your ZIP code instead — auto-detect works on the live site."); return; }
    setDetecting(true);
    navigator.geolocation.getCurrentPosition(
      pos => { setDetecting(false); onSearch({lat:pos.coords.latitude, lng:pos.coords.longitude, miles:parseInt(radius), label:`Within ${radius} miles of your location`}); setOpen(false); },
      ()   => { setDetecting(false); setErr("Location blocked here — enter your ZIP code instead."); }
    );
  }

  function doNearMeNow() {
    if (!navigator.geolocation) { onSearch({lat:37.422,lng:-122.0841,miles:10,label:"Within 10 miles of your location"}); return; }
    setDetecting(true);
    navigator.geolocation.getCurrentPosition(
      pos => { setDetecting(false); onSearch({lat:pos.coords.latitude,lng:pos.coords.longitude,miles:10,label:"Within 10 miles of your location"}); },
      ()   => { setDetecting(false); setErr("Location blocked — try ZIP code."); }
    );
  }

  const hasFilters = activeSearch || activeTags.length > 0;

  return (
    <div style={{marginBottom:20}}>
      {/* Lights Near Me Now — hero button */}
      <button onClick={doNearMeNow} disabled={detecting} style={{

      <button onClick={()=>setOpen(o=>!o)} style={{

        padding:"12px 16px",background:C.white,border:`1px solid ${C.border}`,borderRadius:open?"12px 12px 0 0":12,

function GoogleMapView({listings, onSelect, searchCenter, searchMiles, C}) {
  const ref = useRef(null), mapRef = useRef(null), markersRef = useRef([]), circleRef = useRef(null), iwRef = useRef(null);
  useEffect(()=>{
    if (!ref.current||!window.google||!window.google.maps) return;
    const G=window.google;
    const styles=[
      {elementType:"geometry",stylers:[{color:"#f0ede6"}]},
      {elementType:"labels.text.stroke",stylers:[{color:"#f0ede6"}]},
      {elementType:"labels.text.fill",stylers:[{color:"#3d5a35"}]},
      {featureType:"road",elementType:"geometry",stylers:[{color:"#ddd8cc"}]},
      {featureType:"road.highway",elementType:"geometry",stylers:[{color:"#c8c0b0"}]},
      {featureType:"water",elementType:"geometry",stylers:[{color:"#a8cce0"}]},
      {featureType:"poi.park",elementType:"geometry",stylers:[{color:"#c8e0b8"}]},
      {featureType:"poi",elementType:"labels",stylers:[{visibility:"off"}]},
      {featureType:"administrative",elementType:"geometry.stroke",stylers:[{color:"#b0a890"}]},
    ];
    const center=searchCenter||(listings[0]?{lat:listings[0].lat,lng:listings[0].lng}:{lat:39.5,lng:-98.35});
    const zoom=searchCenter?(searchMiles&&searchMiles<=10?11:9):(listings.length>1?5:10);
    if (!mapRef.current) mapRef.current=new G.maps.Map(ref.current,{center,zoom,styles,mapTypeControl:false,streetViewControl:false,fullscreenControl:false,zoomControlOptions:{position:G.maps.ControlPosition.RIGHT_CENTER}});
    else { mapRef.current.setCenter(center); mapRef.current.setZoom(zoom); }
    if (circleRef.current){circleRef.current.setMap(null);circleRef.current=null;}
    if (searchCenter&&searchMiles) circleRef.current=new G.maps.Circle({map:mapRef.current,center:searchCenter,radius:searchMiles*1609.34,fillColor:C.primary,fillOpacity:.07,strokeColor:C.primary,strokeWeight:1.5,strokeOpacity:.35});
    if (iwRef.current) iwRef.current.close();
    iwRef.current=new G.maps.InfoWindow();
    markersRef.current.forEach(m=>m.setMap(null)); markersRef.current=[];
    listings.forEach(listing=>{
      const avg=avgRating(listing);
      const marker=new G.maps.Marker({
        position:{lat:listing.lat,lng:listing.lng},map:mapRef.current,title:listing.address,
        icon:{path:"M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z",fillColor:C.cta,fillOpacity:1,strokeColor:"#7a100a",strokeWeight:1.5,scale:1.7,anchor:new G.maps.Point(12,22)},
        animation:G.maps.Animation.DROP,
      });
      marker.addListener("click",()=>{
        iwRef.current.setContent(`<div style="font-family:'Georgia',serif;padding:14px;min-width:200px;"><div style="font-size:13px;font-weight:700;color:${C.primary};margin-bottom:6px">🎄 ${listing.address}</div><div style="color:${C.textMid};font-size:12px;margin-bottom:10px">★ ${avg?avg.toFixed(1):"New"} · ${listing.ratings.length} rating${listing.ratings.length!==1?"s":""}</div><button id="iw-btn" style="background:${C.primary};color:#fff;border:none;border-radius:6px;padding:6px 14px;font-size:12px;font-weight:600;cursor:pointer;width:100%">View Details →</button></div>`);
        iwRef.current.open(mapRef.current,marker);
        G.maps.event.addListenerOnce(iwRef.current,"domready",()=>{
          const btn=document.getElementById("iw-btn");
          if (btn) btn.addEventListener("click",()=>onSelect(listing));
        });
      });
      markersRef.current.push(marker);
    });
    if (!searchCenter&&listings.length>1){const b=new G.maps.LatLngBounds();listings.forEach(l=>b.extend({lat:l.lat,lng:l.lng}));mapRef.current.fitBounds(b,{padding:50});}
  },[listings,searchCenter,searchMiles]);
  return <div ref={ref} style={{height:"min(440px,55vw)",borderRadius:10,overflow:"hidden",border:`1px solid ${C.border}`}}/>;
}

function LeafletMapView({listings, onSelect, searchCenter, searchMiles, C}) {
  const ref=useRef(null), mapRef=useRef(null);
  const [ready,setReady]=useState(!!window.L);
  useEffect(()=>{
    if (window.L){setReady(true);return;}
    if (!document.getElementById("lf-css")){const l=document.createElement("link");l.id="lf-css";l.rel="stylesheet";l.href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css";document.head.appendChild(l);}
    const s=document.createElement("script");s.src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js";s.onload=()=>setReady(true);document.head.appendChild(s);
  },[]);
  useEffect(()=>{
    if (!ready||!ref.current) return;
    const L=window.L;
    if (mapRef.current){mapRef.current.remove();mapRef.current=null;}
    const center=searchCenter?[searchCenter.lat,searchCenter.lng]:(listings[0]?[listings[0].lat,listings[0].lng]:[39.5,-98.35]);
    const zoom=searchCenter?(searchMiles&&searchMiles<=10?11:9):(listings.length>1?5:10);
    const map=L.map(ref.current,{center,zoom});mapRef.current=map;
    L.tileLayer("https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png",{attribution:"© OpenStreetMap © CARTO",maxZoom:19}).addTo(map);
    if (searchCenter&&searchMiles) L.circle([searchCenter.lat,searchCenter.lng],{radius:searchMiles*1609.34,color:C.primary,fillColor:C.primary,fillOpacity:.07,weight:1.5,opacity:.35}).addTo(map);
    const icon=L.divIcon({className:"",html:`<div style="width:28px;height:28px;background:${C.cta};border-radius:50% 50% 50% 0;transform:rotate(-45deg);border:2px solid #7a100a;box-shadow:0 2px 8px rgba(0,0,0,.25);display:flex;align-items:center;justify-content:center"><span style="transform:rotate(45deg);font-size:12px">🎄</span></div>`,iconSize:[28,28],iconAnchor:[14,28],popupAnchor:[0,-30]});
    listings.forEach(listing=>{
      const avg=avgRating(listing);
      L.marker([listing.lat,listing.lng],{icon}).addTo(map).bindPopup(`<div style="font-family:Georgia,serif;padding:12px;min-width:185px;"><div style="font-size:13px;font-weight:700;color:${C.primary};margin-bottom:5px">🎄 ${listing.address}</div><div style="color:${C.textMid};font-size:12px;margin-bottom:9px">★ ${avg?avg.toFixed(1):"New"} · ${listing.ratings.length} rating${listing.ratings.length!==1?"s":""}</div><button onclick="window.__sel('${listing.id}')" style="background:${C.primary};color:#fff;border:none;border-radius:6px;padding:6px 14px;font-size:12px;font-weight:600;cursor:pointer;width:100%">View Details →</button></div>`,{className:"cl-popup"});
    });
    if (!document.getElementById("lf-sty")){const s=document.createElement("style");s.id="lf-sty";s.textContent=`.cl-popup .leaflet-popup-content-wrapper{background:#fff;border:1px solid ${C.border};border-radius:10px;padding:0;box-shadow:0 4px 20px rgba(0,0,0,.12)}.cl-popup .leaflet-popup-content{margin:0}.cl-popup .leaflet-popup-tip{background:#fff}.cl-popup .leaflet-popup-close-button{color:${C.textLight}!important;font-size:16px!important;top:6px!important;right:8px!important}`;document.head.appendChild(s);}
    return ()=>{if (mapRef.current){mapRef.current.remove();mapRef.current=null;}};
  },[ready,listings,searchCenter,searchMiles]);
  useEffect(()=>{window.__sel=id=>{const l=listings.find(x=>x.id===id);if(l)onSelect(l);};return()=>{delete window.__sel;};},[listings,onSelect]);
  if (!ready) return <div style={{height:"min(440px,55vw)",background:C.creamDark,borderRadius:10,display:"flex",alignItems:"center",justifyContent:"center",color:C.textLight,border:`1px solid ${C.border}`}}>Loading map…</div>;
  return <div ref={ref} style={{height:"min(440px,55vw)",borderRadius:10,overflow:"hidden",border:`1px solid ${C.border}`}}/>;
}

function MapPanel({listings, onSelect, searchCenter, searchMiles, C}) {

        </div>
        {engine!=="loading"&&<span style={{fontSize:11,color:C.textLight,background:C.creamDark,padding:"3px 9px",borderRadius:10,border:`1px solid ${C.border}`}}>{engine==="google"?"Google Maps":"OpenStreetMap"}</span>}

         </div>

        {listing.hours&&<div style={{fontSize:11,color:C.primaryMid,marginBottom:4,fontWeight:600}}>🕐 {listing.hours}</div>}
        {tags.length>0&&<div style={{display:"flex",gap:4,flexWrap:"wrap",marginBottom:4}}>{tags.slice(0,3).map(t=><span key={t.id} style={{fontSize:10,background:C.creamDark,color:C.textMid,padding:"1px 6px",borderRadius:8,border:`1px solid ${C.border}`}}>{t.icon} {t.label}</span>)}</div>}

// ─── Modal ────────────────────────────────────────────────────────────────────
function Modal({listing, onClose, onRate, onComment, onEdit, onDelete, onVisit, onToggleActive, isFav, onToggleFav, C, holiday}) {
  const [rating,setRating]=useState(0);
  const [comment,setComment]=useState("");
  const [author,setAuthor]=useState("");
  const [rated,setRated]=useState(false);
  const [visited,setVisited]=useState(false);
  const [shared,setShared]=useState(false);
  const [mode,setMode]=useState("view");
  const [pinInput,setPinInput]=useState("");
  const [pinError,setPinError]=useState("");
  const [pinAction,setPinAction]=useState("");
  const [editAddress,setEditAddress]=useState(listing.address);
  const [editDisplayName,setEditDisplayName]=useState(listing.displayName||"");
  const [editDescription,setEditDescription]=useState(listing.description||"");
  const [editHours,setEditHours]=useState(listing.hours||"");
  const [editTags,setEditTags]=useState(listing.tags||[]);
  const avg=avgRating(listing);
  const allTags = TAGS[holiday]||TAGS.christmas;
  const tags=(listing.tags||[]).map(tid=>allTags.find(t=>t.id===tid)).filter(Boolean);

  function postComment(){if(!comment.trim())return;onComment(listing.id,author.trim()||"Anonymous",comment.trim());setComment("");setAuthor("");}
  function startPinCheck(action){setPinAction(action);setPinInput("");setPinError("");setMode("pin");}
  function submitPin(){if(pinInput===listing.pin){setPinError("");setMode(pinAction);}else{setPinError("Incorrect PIN. Please try again.");}}
  function submitEdit(){if(!editAddress.trim())return;onEdit(listing.id,{address:editAddress.trim(),displayName:editDisplayName.trim(),description:editDescription.trim(),hours:editHours.trim(),tags:editTags});setMode("view");}

  function handleShare(){
    const text=`Check out this Christmas lights display: ${listing.displayName||listing.address}`;
    if(navigator.share){navigator.share({title:"Christmas Lights Finder",text,url:window.location.href}).catch(()=>{});}
    else{navigator.clipboard?.writeText(text+"\n"+window.location.href).catch(()=>{});setShared(true);setTimeout(()=>setShared(false),2500);}
  }

  function handleVisit(){if(visited)return;onVisit(listing.id);setVisited(true);}

  const field={padding:"9px 13px",border:`1px solid ${C.border}`,borderRadius:8,fontSize:14,color:C.textDark,background:C.cream,outline:"none",fontFamily:"inherit",width:"100%",boxSizing:"border-box"};

  return (
    <div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(10,25,15,.55)",zIndex:1000,display:"flex",alignItems:"flex-end",justifyContent:"center",backdropFilter:"blur(4px)"}}>

            <div style={{fontSize:13,color:C.textLight,marginBottom:20}}>Enter the 4-digit PIN you created when submitting this listing.</div>
            <input value={pinInput} onChange={e=>{setPinInput(e.target.value.replace(/\D/g,"").slice(0,4));setPinError("");}} onKeyDown={e=>{if(e.key==="Enter")submitPin();}} type="password" maxLength={4} placeholder="••••" style={{...field,textAlign:"center",fontSize:22,letterSpacing:"10px",width:140,margin:"0 auto 10px",display:"block"}} autoFocus/>
            {pinError&&<div style={{color:C.cta,fontSize:13,marginBottom:12}}>⚠️ {pinError}</div>}

            <button onClick={()=>startPinCheck("delete")} style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",gap:6,padding:"9px",background:"transparent",color:C.cta,border:`1.5px solid ${C.cta}`,borderRadius:8,cursor:"pointer",fontSize:13,fontFamily:"'Playfair Display',serif",fontWeight:600}}>🗑️ Delete Listing</button>
          </div>

        </>)}
      </div>
    </div>
  );
}

// ─── Submit Form (2-Step) ─────────────────────────────────────────────────────
function SubmitForm({onSubmit, onClose, C, holiday}) {
  const [step,setStep]=useState(1);
  const [address,setAddress]=useState("");
  const [city,setCity]=useState("");
  const [stateVal,setStateVal]=useState("");

  const [video,setVideo]=useState(null);

  const [mapsLoaded, setMapsLoaded] = useState(false);

  useEffect(()=>{
    loadGoogleMaps().then(()=>{
      setMapsLoaded(true);

      try {
        const ac=new window.google.maps.places.Autocomplete(inputRef.current,{types:["address"]});
        ac.addListener("place_changed",()=>{const p=ac.getPlace();if(p.formatted_address)setAddress(p.formatted_address);});
      } catch(e) {}
    }).catch(()=>{ setMapsLoaded(false); });
  },[]);

  function handlePhoto(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{setPhoto(ev.target.result);setPreview(ev.target.result);};r.readAsDataURL(f);}
  function handleVideo(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{setVideo(ev.target.result);setVideoName(f.name);};r.readAsDataURL(f);}
  const H = HOLIDAYS[holiday];

          <div style={{fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:20,color:C.primary}}>{H.icon} {holiday==="halloween"?"Add Your Haunt":"Add Your Display"}</div>

// ─── Route Generator ────────────────────────────────────────────────────────
function RouteGenerator({listings, C, holiday}) {
  const H = HOLIDAYS[holiday]||HOLIDAYS.christmas;
  const [selected, setSelected] = useState([]);
  const [routeName, setRouteName] = useState("My Holiday Display Tour");
  const mapRef = useRef(null);
  const mapInstanceRef = useRef(null);
  const [mapEngine, setMapEngine] = useState("loading");
  const [totalMiles, setTotalMiles] = useState(0);

  useEffect(()=>{
    loadGoogleMaps().then(()=>setMapEngine("google")).catch(()=>setMapEngine("leaflet"));
  },[]);

  // Recalculate total distance whenever selection changes
  useEffect(()=>{
    if (selected.length < 2) { setTotalMiles(0); return; }
    let total = 0;
    for (let i=0; i<selected.length-1; i++) {
      total += getDistanceMiles(selected[i].lat, selected[i].lng, selected[i+1].lat, selected[i+1].lng);
    }
    setTotalMiles(total);
  },[selected]);

  // Draw route on map
  useEffect(()=>{
    if (mapEngine==="google" && mapRef.current && window.google && selected.length > 0) {
      const google = window.google;
      const styles = [
        {elementType:"geometry",stylers:[{color:"#eef5ee"}]},
        {featureType:"road",elementType:"geometry",stylers:[{color:"#c8dfc8"}]},
        {featureType:"road.highway",elementType:"geometry",stylers:[{color:"#a0c8a0"}]},
        {featureType:"water",elementType:"geometry",stylers:[{color:"#90c0d8"}]},
        {featureType:"poi",elementType:"geometry",stylers:[{color:"#d8eed8"}]},
      ];
      if (!mapInstanceRef.current) {
        mapInstanceRef.current = new google.maps.Map(mapRef.current, {
          center:{lat:selected[0].lat,lng:selected[0].lng}, zoom:10,
          styles, mapTypeControl:false, streetViewControl:false,
        });
      }
      // Clear old markers/polylines by recreating map overlays
      const bounds = new google.maps.LatLngBounds();
      selected.forEach((stop, i) => {
        bounds.extend({lat:stop.lat, lng:stop.lng});
        new google.maps.Marker({
          position:{lat:stop.lat,lng:stop.lng},
          map:mapInstanceRef.current,
          label:{text:String(i+1),color:"#fff",fontWeight:"bold",fontSize:"12px"},
          icon:{path:google.maps.SymbolPath.CIRCLE,scale:14,fillColor:i===0?C.primary:i===selected.length-1?C.cta:C.accent,fillOpacity:1,strokeColor:"#fff",strokeWeight:2},
          title:stop.address,
        });
      });
      if (selected.length > 1) {
        new google.maps.Polyline({
          path:selected.map(s=>({lat:s.lat,lng:s.lng})),
          geodesic:true, strokeColor:C.primary, strokeOpacity:0.7, strokeWeight:3,
          map:mapInstanceRef.current,
        });
      }
      mapInstanceRef.current.fitBounds(bounds, {padding:50});
    } else if (mapEngine==="leaflet" && mapRef.current && window.L && selected.length > 0) {
      const L = window.L;
      if (mapInstanceRef.current) { mapInstanceRef.current.remove(); mapInstanceRef.current = null; }
      const map = L.map(mapRef.current, {center:[selected[0].lat, selected[0].lng], zoom:10});
      mapInstanceRef.current = map;
      L.tileLayer("https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png",{attribution:"© OpenStreetMap © CARTO",maxZoom:19}).addTo(map);
      const pts = selected.map(s=>[s.lat,s.lng]);
      if (selected.length > 1) L.polyline(pts,{color:C.primary,weight:3,opacity:0.7}).addTo(map);
      selected.forEach((s,i)=>{
        const col = i===0?C.primary:i===selected.length-1?C.cta:C.accent;
        L.marker([s.lat,s.lng],{icon:L.divIcon({className:"",html:`<div style="width:26px;height:26px;border-radius:50%;background:${col};border:2px solid #fff;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:bold;font-size:11px;box-shadow:0 2px 6px rgba(0,0,0,.3)">${i+1}</div>`,iconSize:[26,26],iconAnchor:[13,13]})}).addTo(map).bindPopup(`<b>${s.address}</b>`);
      });
      const bounds = L.latLngBounds(pts);
      map.fitBounds(bounds,{padding:[40,40]});
    }
  },[selected, mapEngine]);

  function toggleStop(listing) {
    setSelected(prev => {
      if (prev.find(s=>s.id===listing.id)) return prev.filter(s=>s.id!==listing.id);
      return [...prev, listing];
    });
    // Reset map instance so it redraws
    if (mapInstanceRef.current && mapEngine==="google") {
      mapInstanceRef.current = null;
    }
  }

  function moveStop(idx, dir) {
    setSelected(prev => {
      const next = [...prev];
      const swap = idx + dir;
      if (swap < 0 || swap >= next.length) return prev;
      [next[idx], next[swap]] = [next[swap], next[idx]];
      return next;
    });
  }

  function openInGoogleMaps() {
    if (selected.length < 2) return;
    const base = "https://www.google.com/maps/dir/";
    const waypoints = selected.map(s => encodeURIComponent(s.address)).join("/");
    window.open(base + waypoints, "_blank");
  }

  return (
    <div style={{animation:"fadeUp .3s ease"}}>
      {/* Header */}
      <div style={{background:C.white,border:`1px solid ${C.border}`,borderRadius:14,padding:20,marginBottom:16,boxShadow:`0 2px 10px ${C.shadow}`}}>
        <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:4}}>
          <span style={{fontSize:24}}>🛣️</span>
          <input
            value={routeName}
            onChange={e=>setRouteName(e.target.value)}
            style={{flex:1,fontFamily:"'Playfair Display',serif",fontSize:20,fontWeight:700,color:C.primary,background:"none",border:"none",outline:"none",borderBottom:`2px solid ${C.border}`}}
          />
        </div>
        <p style={{fontSize:13,color:C.textLight,margin:"8px 0 0"}}>Pick displays below to build your driving tour. Drag to reorder stops.</p>
      </div>

      <div className="route-grid">

        {/* Left: display picker */}
        <div>
          <div style={{fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:14,color:C.primary,marginBottom:10}}>
            📍 Available Displays ({listings.length})
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:8,maxHeight:420,overflowY:"auto",paddingRight:4}}>
            {listings.length===0&&(
              <div style={{textAlign:"center",padding:32,color:C.textLight,fontSize:13,background:C.cream,borderRadius:10,border:`1px solid ${C.border}`}}>No displays yet — add some first!</div>
            )}
            {listings.map(l=>{
              const isAdded = !!selected.find(s=>s.id===l.id);
              const avg = avgRating(l);
              return (
                <div key={l.id}
                  onClick={()=>toggleStop(l)}
                  style={{background:isAdded?`linear-gradient(135deg,${C.primaryMid}15,${C.primary}08)`:C.white,border:`1.5px solid ${isAdded?C.primaryMid:C.border}`,borderRadius:10,padding:"10px 14px",cursor:"pointer",transition:"all .2s",display:"flex",alignItems:"center",gap:10}}
                  onMouseEnter={e=>e.currentTarget.style.borderColor=C.primaryMid}
                  onMouseLeave={e=>e.currentTarget.style.borderColor=isAdded?C.primaryMid:C.border}>
                  <div style={{width:24,height:24,borderRadius:"50%",border:`2px solid ${isAdded?C.primary:C.border}`,background:isAdded?C.primary:"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,transition:"all .2s"}}>
                    {isAdded&&<span style={{color:"#fff",fontSize:14,lineHeight:1}}>✓</span>}
                  </div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:13,fontWeight:600,color:C.textDark,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{l.address}</div>
                    <div style={{fontSize:11,color:C.textLight,marginTop:2}}>★ {avg?avg.toFixed(1):"No ratings"} · {l.ratings.length} rating{l.ratings.length!==1?"s":""}</div>
                  </div>
                </div>
              );
            })}
          </div>
        </div>

        {/* Right: route order + map */}
        <div style={{display:"flex",flexDirection:"column",gap:12}}>
          <div>
            <div style={{fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:14,color:C.primary,marginBottom:10}}>
              🗺️ Your Route ({selected.length} stop{selected.length!==1?"s":""}{totalMiles>0?` · ~${totalMiles.toFixed(1)} mi`:""})
            </div>
            {selected.length===0?(
              <div style={{textAlign:"center",padding:24,color:C.textLight,fontSize:13,background:C.cream,borderRadius:10,border:`1px dashed ${C.border}`}}>
                ← Select displays to add them to your route
              </div>
            ):(
              <div style={{display:"flex",flexDirection:"column",gap:6,maxHeight:200,overflowY:"auto",paddingRight:4}}>
                {selected.map((s,i)=>(
                  <div key={s.id} style={{background:C.white,border:`1px solid ${C.border}`,borderRadius:8,padding:"8px 10px",display:"flex",alignItems:"center",gap:8}}>
                    <div style={{width:22,height:22,borderRadius:"50%",background:i===0?C.primary:i===selected.length-1?C.cta:C.accent,color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,flexShrink:0}}>{i+1}</div>
                    <div style={{flex:1,fontSize:12,color:C.textDark,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{s.address}</div>
                    <div style={{display:"flex",gap:2,flexShrink:0}}>
                      <button onClick={()=>moveStop(i,-1)} disabled={i===0} style={{background:"none",border:`1px solid ${C.border}`,borderRadius:4,padding:"1px 5px",cursor:i===0?"not-allowed":"pointer",color:C.textLight,fontSize:12}}>↑</button>
                      <button onClick={()=>moveStop(i,1)} disabled={i===selected.length-1} style={{background:"none",border:`1px solid ${C.border}`,borderRadius:4,padding:"1px 5px",cursor:i===selected.length-1?"not-allowed":"pointer",color:C.textLight,fontSize:12}}>↓</button>
                      <button onClick={()=>toggleStop(s)} style={{background:"none",border:`1px solid ${C.border}`,borderRadius:4,padding:"1px 5px",cursor:"pointer",color:C.cta,fontSize:12}}>✕</button>
                    </div>
                  </div>
                ))}
              </div>
            )}
          </div>

          {/* Mini map */}
          <div style={{borderRadius:10,overflow:"hidden",border:`1px solid ${C.border}`,background:C.cream}}>
            {selected.length===0?(
              <div style={{height:180,display:"flex",alignItems:"center",justifyContent:"center",color:C.textLight,fontSize:13,flexDirection:"column",gap:6}}>
                <span style={{fontSize:28}}>🗺️</span>
                <span>Add stops to see your route</span>
              </div>
            ):(
              <div ref={mapRef} style={{height:180}}/>
            )}
          </div>

          {/* Actions */}
          <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
            <button
              onClick={openInGoogleMaps}
              disabled={selected.length<2}
              style={{flex:1,padding:"10px 14px",background:selected.length>=2?C.primary:"#ccc",color:selected.length>=2?C.cream:"#888",border:"none",borderRadius:8,fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:13,cursor:selected.length>=2?"pointer":"not-allowed",transition:"all .2s"}}
            >
              {selected.length>=2?"🚗 Open in Google Maps":"Select 2+ stops"}
            </button>
            {selected.length>0&&(
              <button onClick={()=>setSelected([])} style={{padding:"10px 14px",background:"transparent",color:C.cta,border:`1px solid ${C.cta}`,borderRadius:8,fontSize:13,cursor:"pointer",fontFamily:"'Playfair Display',serif"}}>
                Clear
              </button>
            )}
          </div>
        </div>
      </div>
    </div>
  );
}

// ─── App ──────────────────────────────────────────────────────────────────────
function App() {
  const [holiday,setHoliday]=useState(()=>{
    const mo=new Date().getMonth();
    return mo===9?"halloween":"christmas"; // auto-detect October
  });
  const H = HOLIDAYS[holiday];
  const C = H.colors;

  const [listings,setListings]=useState([]);
  const [view,setView]=useState("list");
  const [selected,setSelected]=useState(null);
  const [showForm,setShowForm]=useState(false);
  const [textSearch,setTextSearch]=useState("");
  const [activeSearch,setActiveSearch]=useState(null);
  const [activeTags,setActiveTags]=useState([]);
  const [sortBy,setSortBy]=useState("auto"); // "auto"|"rating"|"nearest"|"visited"|"newest"
  const [favorites,setFavorites]=useState([]);
  const [showFavs,setShowFavs]=useState(false);

  const [dbLoading, setDbLoading] = useState(true);

  useEffect(()=>{
    (async()=>{
      // Load favorites from localStorage (these are per-user, not shared)
      try { const f=localStorage.getItem(STORAGE_KEY+"-favs"); if(f) setFavorites(JSON.parse(f)); } catch(e){}
      // Load listings from Supabase
      const rows = await dbGetListings();
      if (rows) { setListings(rows); }
      setDbLoading(false);
    })();
  },[]);

  function saveFavs(updated){setFavorites(updated);try{localStorage.setItem(STORAGE_KEY+"-favs",JSON.stringify(updated));}catch(e){}}

  const handleSubmit=useCallback(async d=>{
    const newListing={id:"l-"+Date.now(),address:d.address,displayName:d.displayName||"",lat:d.lat,lng:d.lng,photo:d.photo,video:d.video||null,description:d.description||"",hours:d.hours||"",tags:d.tags||[],ratings:[],comments:[],submitter:d.submitter,pin:d.pin,createdAt:Date.now(),active:true,visits:0,holidays:[holiday]};
    const dbId = await dbSaveListing(newListing);
    if (dbId) newListing.id = dbId;
    setListings(p=>[newListing,...p]);
    setShowForm(false);
  },[listings,holiday]);

  const handleRate=useCallback(async(id,r)=>{
    const listing = listings.find(l=>l.id===id);
    if(!listing) return;
    const newRatings=[...listing.ratings,r];
    setListings(p=>p.map(l=>l.id===id?{...l,ratings:newRatings}:l));
    setSelected(p=>p?.id===id?{...p,ratings:newRatings}:p);
    await dbUpdateListing(id,{ratings:newRatings});
  },[listings]);

  const handleComment=useCallback(async(id,a,t)=>{
    const listing = listings.find(l=>l.id===id);
    if(!listing) return;
    const newComments=[...listing.comments,{author:a,text:t,time:Date.now()}];
    setListings(p=>p.map(l=>l.id===id?{...l,comments:newComments}:l));
    setSelected(p=>p?.id===id?{...p,comments:newComments}:p);
    await dbUpdateListing(id,{comments:newComments});
  },[listings]);

  const handleEdit=useCallback(async(id,changes)=>{
    setListings(p=>p.map(l=>l.id===id?{...l,...changes}:l));
    setSelected(p=>p?.id===id?{...p,...changes}:p);
    await dbUpdateListing(id,changes);
  },[listings]);

  const handleDelete=useCallback(async(id)=>{
    setListings(p=>p.filter(l=>l.id!==id));
    setSelected(null);
    await dbDeleteListing(id);
  },[]);

  const handleVisit=useCallback(async(id)=>{
    const listing = listings.find(l=>l.id===id);
    if(!listing) return;
    const newVisits=(listing.visits||0)+1;
    setListings(p=>p.map(l=>l.id===id?{...l,visits:newVisits}:l));
    setSelected(p=>p?.id===id?{...p,visits:newVisits}:p);
    await dbUpdateListing(id,{visits:newVisits});
  },[listings]);

  const handleToggleActive=useCallback(async(id)=>{
    const listing = listings.find(l=>l.id===id);
    if(!listing) return;
    const newActive=listing.active===false?true:false;
    setListings(p=>p.map(l=>l.id===id?{...l,active:newActive}:l));
    setSelected(p=>p?.id===id?{...p,active:newActive}:p);
    await dbUpdateListing(id,{active:newActive});
  },[listings]);

  const handleToggleFav=useCallback((id)=>{const updated=favorites.includes(id)?favorites.filter(x=>x!==id):[...favorites,id];saveFavs(updated);},[favorites]);
  function handleTagToggle(tid){setActiveTags(p=>p.includes(tid)?p.filter(x=>x!==tid):[...p,tid]);}

  const baseList = listings
    .filter(l=>(l.holidays||["christmas"]).includes(holiday))
    .filter(l=>!textSearch||(l.address+' '+(l.displayName||'')).toLowerCase().includes(textSearch.toLowerCase()))
    .map(l=>({...l,dist:activeSearch?.lat!=null?getDistanceMiles(activeSearch.lat,activeSearch.lng,l.lat,l.lng):null}))
    .filter(l=>!activeSearch||!activeSearch.miles||l.dist==null||l.dist<=activeSearch.miles)
    .filter(l=>activeTags.length===0||activeTags.some(tid=>(l.tags||[]).includes(tid)))
    .filter(l=>!showFavs||favorites.includes(l.id));

  const displayed = [...baseList].sort((a,b)=>{
    if(sortBy==="rating") return avgRating(b)-avgRating(a);
    if(sortBy==="nearest") return (a.dist??999)-(b.dist??999);
    if(sortBy==="visited") return (b.visits||0)-(a.visits||0);
    if(sortBy==="newest") return b.createdAt-a.createdAt;
    // auto: distance if search active, else rating
    return a.dist!=null&&b.dist!=null?a.dist-b.dist:avgRating(b)-avgRating(a);
  });

  const holidayListings = listings.filter(l=>(l.holidays||["christmas"]).includes(holiday));
  const topRated=[...holidayListings].sort((a,b)=>avgRating(b)-avgRating(a)).slice(0,3);
  const searchCenter=activeSearch?.lat?{lat:activeSearch.lat,lng:activeSearch.lng}:null;
  const stateCount = new Set(holidayListings.map(l=>{const m=l.address.match(/,\s*([A-Z]{2})\s*\d/);return m?m[1]:null;}).filter(Boolean)).size;

  if (dbLoading) return (
    <div style={{minHeight:"100vh",background:H.bg,display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:16}}>
      <div style={{fontSize:48}}>{H.icon}</div>
      <div style={{fontFamily:"'Playfair Display',serif",fontSize:20,color:C.primary}}>Loading displays...</div>
      <div style={{width:40,height:40,border:`4px solid ${C.border}`,borderTop:`4px solid ${C.primary}`,borderRadius:"50%",animation:"spin 1s linear infinite"}}/>
    </div>
  );

  return (
    <div style={{minHeight:"100vh",background:H.bg,color:C.textDark,fontFamily:"'Georgia',serif"}}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;900&family=Cinzel:wght@700;900&display=swap');
        *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
        html,body{margin:0;padding:0;overflow-x:hidden}
        @keyframes sf{0%{transform:translateY(0) translateX(0);opacity:.9}50%{transform:translateY(55vh) translateX(var(--sw,0px));opacity:.6}100%{transform:translateY(110vh) translateX(0);opacity:0}}
        @keyframes spin{to{transform:rotate(360deg)}}
        @keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
        .card-enter{animation:fadeUp .3s ease forwards}
        ::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:${C.border};border-radius:3px}
        input,textarea,button{font-family:inherit;-webkit-appearance:none}
        input::placeholder,textarea::placeholder{color:${C.textLight}}
        .pac-container{background:${C.white}!important;border:1px solid ${C.border}!important;border-radius:8px!important;font-family:Georgia,serif!important;box-shadow:0 4px 20px rgba(0,0,0,.2)!important;z-index:9999!important}
        .pac-item{background:${C.white}!important;color:${C.textMid}!important;border-top:1px solid ${C.creamDark}!important;padding:10px 12px!important;cursor:pointer!important;font-size:14px!important}
        .pac-item:hover{background:${C.creamDark}!important}
        .pac-item-query{color:${C.primary}!important}
        .bottom-nav{display:flex;position:fixed;bottom:0;left:0;right:0;background:${H.navBg};border-top:1px solid ${C.border};z-index:100;backdrop-filter:blur(10px);padding:6px 0 max(6px,env(safe-area-inset-bottom))}
        .nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 4px;background:none;border:none;cursor:pointer;font-size:9px;font-family:'Playfair Display',serif;color:${C.textLight};transition:color .15s;min-width:0;position:relative}
        .nav-btn.active{color:${C.primary};font-weight:700}
        .nav-btn .icon{font-size:20px;line-height:1}
        @media(min-width:640px){.bottom-nav{display:none}}
        .desktop-nav{display:none!important}
        @media(min-width:640px){.desktop-nav{display:flex!important}}
        .route-grid{display:flex;flex-direction:column;gap:16px}
        @media(min-width:640px){.route-grid{display:grid;grid-template-columns:1fr 1fr}}
        .mobile-add{display:flex!important}
        @media(min-width:640px){.mobile-add{display:none!important}}
        .holiday-tab{padding:10px 22px;border:none;cursor:pointer;font-family:'Playfair Display',serif;font-weight:700;font-size:14px;transition:all .2s;border-radius:0}
      `}</style>
      <Snow holiday={holiday}/>

      {/* ── Header ── */}
      <header style={{position:"relative",zIndex:10,borderBottom:`1px solid ${C.border}`,background:H.headerBg,backdropFilter:"blur(8px)"}}>
        <div style={{height:4,background:`repeating-linear-gradient(90deg, ${H.stripeColors[0]} 0px, ${H.stripeColors[0]} 20px, ${H.stripeColors[1]} 20px, ${H.stripeColors[1]} 40px, ${H.stripeColors[2]} 40px, ${H.stripeColors[2]} 60px, ${H.stripeColors[1]} 60px, ${H.stripeColors[1]} 80px)`}}/>

        {/* Holiday Tabs */}
        <div style={{display:"flex",borderBottom:`1px solid ${C.border}`}}>
          {Object.values(HOLIDAYS).map(h=>(
            <button key={h.key} className="holiday-tab" onClick={()=>{setHoliday(h.key);setActiveTags([]);setActiveSearch(null);setTextSearch("");}}
              style={{flex:1,background:holiday===h.key?C.primary:"transparent",color:holiday===h.key?C.cream:C.textLight,borderBottom:holiday===h.key?`3px solid ${C.accent}`:"3px solid transparent"}}>
              {h.icon} {h.label}
            </button>
          ))}
        </div>

        <div style={{maxWidth:860,margin:"0 auto",padding:"14px 16px 12px",textAlign:"center"}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:0,marginBottom:8,width:"100%",maxWidth:400,margin:"0 auto 8px"}}>
            <svg viewBox="0 0 320 44" width="100%" height="44" xmlns="http://www.w3.org/2000/svg">
              {/* Wire */}
              <path d="M0 10 Q20 18 40 10 Q60 2 80 10 Q100 18 120 10 Q140 2 160 10 Q180 18 200 10 Q220 2 240 10 Q260 18 280 10 Q300 2 320 10"
                fill="none" stroke={holiday==="halloween"?"#4a2060":"#1a3d2b"} strokeWidth="1.5"/>
              {holiday==="halloween"
                ? [{x:40,c:"#e06010"},{x:80,c:"#7b2d8b"},{x:120,c:"#e06010"},{x:160,c:"#7b2d8b"},{x:200,c:"#e06010"},{x:240,c:"#7b2d8b"},{x:280,c:"#e06010"}].map((b,i)=>(
                  <g key={i}>
                    {/* Stem */}
                    <rect x={b.x-1} y={10} width={3} height={5} rx={1} fill="#2d5a1b"/>
                    {/* Pumpkin body - three lobes */}
                    <ellipse cx={b.x-5} cy={26} rx={5} ry={7} fill={b.c} opacity="0.95"/>
                    <ellipse cx={b.x} cy={24} rx={6} ry={8} fill={b.c} opacity="0.95"/>
                    <ellipse cx={b.x+5} cy={26} rx={5} ry={7} fill={b.c} opacity="0.95"/>
                    {/* Face - eyes */}
                    <polygon points={`${b.x-4},21 ${b.x-2},19 ${b.x},21`} fill="#1a0a2e" opacity="0.7"/>
                    <polygon points={`${b.x+1},21 ${b.x+3},19 ${b.x+5},21`} fill="#1a0a2e" opacity="0.7"/>
                    {/* Face - mouth */}
                    <path d={`M${b.x-3} 27 Q${b.x} 31 ${b.x+3} 27`} fill="none" stroke="#1a0a2e" strokeWidth="1.2" opacity="0.7"/>
                    {/* Glow */}
                    <ellipse cx={b.x} cy={26} rx={9} ry={10} fill={b.c} opacity="0.1"/>
                  </g>
                ))
                : [{x:40,c:"#e8392a"},{x:80,c:"#c9a84c"},{x:120,c:"#52b788"},{x:160,c:"#e8392a"},{x:200,c:"#c9a84c"},{x:240,c:"#52b788"},{x:280,c:"#e8392a"}].map((b,i)=>(
                  <g key={i}>
                    <rect x={b.x-4} y={8} width={8} height={5} rx={1} fill="#1a3d2b"/>
                    <ellipse cx={b.x} cy={22} rx={6} ry={8} fill={b.c} opacity="0.92"/>
                    <ellipse cx={b.x-2} cy={18} rx={1.5} ry={2.5} fill="white" opacity="0.4"/>
                    <ellipse cx={b.x} cy={22} rx={9} ry={11} fill={b.c} opacity="0.12"/>
                  </g>
                ))
              }
            </svg>
          </div>
          <h1 style={{fontFamily:"'Cinzel', serif",fontWeight:900,fontSize:"clamp(20px,5vw,44px)",color:C.primary,margin:"0 0 2px",lineHeight:1.15,letterSpacing:".04em"}}>
            My Holiday Display
          </h1>
          <p style={{color:C.textLight,fontSize:12,margin:"0 0 4px",letterSpacing:".03em"}}>{H.tagline}</p>
          {holidayListings.length>0&&<p style={{color:C.primaryMid,fontSize:12,margin:"0 0 12px",fontWeight:600}}>{H.icon} {holidayListings.length} {H.nounPlural}{stateCount>1?` across ${stateCount} states`:""}</p>}

          {/* Desktop nav */}
          <div className="desktop-nav" style={{justifyContent:"center",gap:8,flexWrap:"wrap"}}>
            {view!=="list"&&<button onClick={()=>setView("list")} style={{display:"flex",alignItems:"center",gap:6,padding:"9px 18px",background:C.cream,color:C.primary,border:`1.5px solid ${C.primaryMid}`,borderRadius:8,fontFamily:"'Playfair Display',serif",fontWeight:600,fontSize:13,cursor:"pointer"}}>🏠 Home</button>}
            <button onClick={()=>setShowForm(true)} style={{display:"flex",alignItems:"center",gap:7,padding:"9px 20px",background:C.cta,color:"#fff",border:"none",borderRadius:8,fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:13,cursor:"pointer",boxShadow:`0 3px 10px rgba(0,0,0,.25)`}}>{H.icon} {H.addLabel}</button>
            <button onClick={()=>setView(v=>v==="list"?"map":"list")} style={{display:"flex",alignItems:"center",gap:7,padding:"9px 18px",background:"transparent",color:C.primary,border:`1.5px solid ${C.primaryMid}`,borderRadius:8,fontFamily:"'Playfair Display',serif",fontWeight:600,fontSize:13,cursor:"pointer"}}>{view==="map"?"📋 List":"🗺️ Map"}</button>
            <button onClick={()=>setView("route")} style={{display:"flex",alignItems:"center",gap:7,padding:"9px 18px",background:view==="route"?C.accent:"transparent",color:view==="route"?C.textDark:C.accent,border:`1.5px solid ${C.accent}`,borderRadius:8,fontFamily:"'Playfair Display',serif",fontWeight:600,fontSize:13,cursor:"pointer"}}>🛣️ Route</button>
          </div>
          {/* Mobile add button */}
          <div style={{display:"flex",justifyContent:"center"}} className="mobile-add">
            <button onClick={()=>setShowForm(true)} style={{display:"flex",alignItems:"center",gap:7,padding:"10px 28px",background:C.cta,color:"#fff",border:"none",borderRadius:8,fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:14,cursor:"pointer",boxShadow:`0 3px 10px rgba(0,0,0,.25)`}}>{H.icon} {H.addLabel}</button>
          </div>
        </div>
      </header>

      <main style={{position:"relative",zIndex:10,maxWidth:860,margin:"0 auto",padding:"20px 12px 90px"}}>
        {view!=="route"&&<SearchPanel onSearch={setActiveSearch} onClear={()=>setActiveSearch(null)} activeSearch={activeSearch} activeTags={activeTags} onTagToggle={handleTagToggle} C={C} holiday={holiday}/>}

        {/* Top Rated strip */}
        {topRated.length>0&&view==="list"&&!activeSearch&&activeTags.length===0&&(
          <div style={{marginBottom:18}}>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
              <div style={{width:3,height:16,background:`linear-gradient(${C.accent},${C.cta})`,borderRadius:2}}/>
              <span style={{fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:14,color:C.primary}}>Top Rated</span>
            </div>
            <div style={{display:"flex",gap:10,overflowX:"auto",paddingBottom:4,scrollbarWidth:"none"}}>
              {topRated.map((l,i)=>{
                const avg=avgRating(l);
                return (
                  <div key={l.id} onClick={()=>setSelected(l)} style={{background:C.white,border:`1px solid ${i===0?C.accent:C.border}`,borderRadius:10,padding:"10px 14px",minWidth:140,maxWidth:180,cursor:"pointer",flexShrink:0,transition:"all .2s"}}
                    onMouseEnter={e=>e.currentTarget.style.transform="translateY(-2px)"} onMouseLeave={e=>e.currentTarget.style.transform="none"}>
                    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:4}}>
                      <span style={{fontSize:16}}>{["🥇","🥈","🥉"][i]}</span>
                      <span style={{fontFamily:"'Playfair Display',serif",fontWeight:900,fontSize:18,color:C.accent}}>★ {avg?avg.toFixed(1):"—"}</span>
                    </div>
                    <div style={{fontSize:11,color:C.textMid,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",fontWeight:600}}>{l.displayName||l.address}</div>
                    {l.hours&&<div style={{fontSize:10,color:C.primaryMid,marginTop:3}}>🕐 {l.hours}</div>}
                  </div>
                );
              })}
            </div>
          </div>
        )}

        {/* Sort bar + favorites */}
        {view==="list"&&(
          <div style={{marginBottom:14}}>
            <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
              <div style={{display:"flex",gap:6,flex:1,flexWrap:"wrap"}}>
                {[["auto","⚡ Smart"],["rating","★ Rating"],["nearest","📍 Nearest"],["visited","👣 Popular"],["newest","🆕 Newest"]].map(([val,label])=>(
                  <button key={val} onClick={()=>setSortBy(val)} style={{padding:"6px 12px",borderRadius:16,fontSize:12,cursor:"pointer",border:`1px solid ${sortBy===val?C.primary:C.border}`,background:sortBy===val?C.primary:"transparent",color:sortBy===val?C.cream:C.textMid,fontWeight:sortBy===val?600:400,transition:"all .15s",whiteSpace:"nowrap"}}>{label}</button>
                ))}
              </div>
              <button onClick={()=>setShowFavs(f=>!f)} style={{display:"flex",alignItems:"center",gap:5,padding:"6px 12px",borderRadius:16,fontSize:12,cursor:"pointer",whiteSpace:"nowrap",border:`1px solid ${showFavs?"#e8392a":C.border}`,background:showFavs?"#fff0ee":"transparent",color:showFavs?"#e8392a":C.textMid,fontWeight:showFavs?600:400,transition:"all .15s"}}>
                {showFavs?"❤️ Favorites":"🤍 Favorites"}{favorites.length>0&&<span style={{background:showFavs?"#e8392a":C.border,color:showFavs?"#fff":C.textLight,borderRadius:"50%",width:16,height:16,display:"inline-flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:700}}>{favorites.length}</span>}
              </button>
            </div>
            <div style={{position:"relative",marginTop:10}}>
              <span style={{position:"absolute",left:13,top:"50%",transform:"translateY(-50%)",fontSize:15,color:C.textLight,pointerEvents:"none"}}>🔍</span>
              <input value={textSearch} onChange={e=>setTextSearch(e.target.value)} placeholder={`Filter by address or neighborhood…`}
                style={{width:"100%",padding:"10px 14px 10px 38px",border:`1px solid ${C.border}`,borderRadius:10,fontSize:13,color:C.textDark,background:C.white,outline:"none",boxShadow:`0 1px 4px ${C.shadow}`,fontFamily:"inherit"}}/>
            </div>
          </div>
        )}

        {activeSearch&&view==="list"&&(
          <div style={{fontSize:12,color:C.textLight,marginBottom:10}}>
            Showing {displayed.length} {displayed.length===1?H.noun:H.nounPlural} within {activeSearch.miles} miles{displayed.length>0?` · sorted by ${sortBy==="auto"?"distance":sortBy}`:""}
          </div>
        )}

        {view==="map"
          ?<MapPanel listings={displayed} onSelect={setSelected} searchCenter={searchCenter} searchMiles={activeSearch?.miles} C={C}/>
          :view==="route"
          ?<RouteGenerator listings={holidayListings} C={C} holiday={holiday}/>
          :(
            <div style={{display:"flex",flexDirection:"column",gap:10}}>
              {displayed.length===0&&(
                <div style={{textAlign:"center",padding:"48px 20px",color:C.textLight,background:C.white,borderRadius:12,border:`1px solid ${C.border}`}}>
                  <div style={{fontSize:36,marginBottom:12}}>{H.icon}</div>
                  <div style={{fontFamily:"'Playfair Display',serif",fontSize:16,color:C.textMid,marginBottom:6}}>
                    {activeSearch?`No ${H.nounPlural} found nearby`:`No ${H.nounPlural} yet`}
                  </div>
                  <div style={{fontSize:13,color:C.textLight,marginBottom:16}}>{activeSearch?"Try a larger radius or a different ZIP code.":"Be the first to add one!"}</div>
                  <button onClick={()=>setShowForm(true)} style={{padding:"10px 24px",background:C.cta,color:"#fff",border:"none",borderRadius:8,fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:14,cursor:"pointer"}}>{H.icon} {H.addLabel}</button>
                </div>
              )}
              {displayed.map((l,i)=>(
                <div key={l.id} className="card-enter" style={{animationDelay:`${i*0.05}s`}}>
                  <ListingCard listing={l} onSelect={setSelected} dist={l.dist} isFav={favorites.includes(l.id)} onToggleFav={handleToggleFav} C={C} holiday={holiday}/>
                </div>
              ))}
            </div>
          )
        }
      </main>

      <div style={{height:4,background:`repeating-linear-gradient(90deg, ${H.stripeColors[0]} 0px, ${H.stripeColors[0]} 20px, ${H.stripeColors[2]} 20px, ${H.stripeColors[2]} 40px, ${H.stripeColors[1]} 40px, ${H.stripeColors[1]} 60px, ${H.stripeColors[2]} 60px, ${H.stripeColors[2]} 80px)`,marginTop:40}}/>

      {/* Mobile bottom nav */}
      <nav className="bottom-nav">
        <button className={"nav-btn"+(view==="list"&&!showFavs?" active":"")} onClick={()=>{setView("list");setShowFavs(false);}}>
          <span className="icon">🏠</span>Home
        </button>
        <button className={"nav-btn"+(view==="map"?" active":"")} onClick={()=>setView("map")}>
          <span className="icon">🗺️</span>Map
        </button>
        <button className="nav-btn" onClick={()=>setShowForm(true)} style={{color:C.cta,fontWeight:700}}>
          <span className="icon">{H.icon}</span>Add
        </button>
        <button className={"nav-btn"+(showFavs?" active":"")} onClick={()=>{setView("list");setShowFavs(f=>!f);}}>
          <span className="icon">{showFavs?"❤️":"🤍"}</span>Saved
          {favorites.length>0&&<span style={{position:"absolute",top:4,right:"calc(50% - 18px)",background:C.cta,color:"#fff",borderRadius:"50%",width:14,height:14,fontSize:9,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700}}>{favorites.length}</span>}
        </button>
        <button className={"nav-btn"+(view==="route"?" active":"")} onClick={()=>setView("route")}>
          <span className="icon">🛣️</span>Route
        </button>
      </nav>

      {selected&&<Modal listing={selected} onClose={()=>setSelected(null)} onRate={handleRate} onComment={handleComment} onEdit={handleEdit} onDelete={handleDelete} onVisit={handleVisit} onToggleActive={handleToggleActive} isFav={favorites.includes(selected.id)} onToggleFav={handleToggleFav} C={C} holiday={holiday}/>}
      {showForm&&<SubmitForm onSubmit={handleSubmit} onClose={()=>setShowForm(false)} C={C} holiday={holiday}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
