name: Supabase Keep-Alive

on:
  schedule:
    - cron: '0 12 */3 * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://crovcuedrgkokabznsac.supabase.co/rest/v1/")
          echo "Supabase responded with HTTP $STATUS"
          echo "Supabase responded with HTTP $STATUS"
