name: Supabase Keep-Alive

on:
  schedule:
    - cron: '0 12 */3 * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          curl -s -o /dev/null -w "Supabase responded with HTTP %{http_code}\n" \
            "https://crovcuedrgkokabznsac.supabase.co/rest/v1/"
